<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寻花令 · Letterpress Folio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="variations/folio.css?v=4" />

  <style>
    /* Page-level chrome — folio app fills the full viewport, with paper
       extending edge-to-edge on tall screens and a soft outer shadow at
       wide ones so it reads as a bound page. */
    html, body { margin: 0; padding: 0; background: #2a2620; min-height: 100vh; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      display: flex;
      justify-content: center;
    }
    #root {
      width: 100%;
      max-width: 1240px;
      background: #f5ecd9;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 30px 80px rgba(0,0,0,0.45);
      min-height: 100vh;
    }
    @media (max-width: 1240px) {
      body { background: #f5ecd9; }
      #root { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="shared/loader.js?v=3"></script>
  <script type="text/babel" src="shared/use-search.jsx"></script>
  <script type="text/babel" src="variations/folio-app.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<FolioApp />);
  </script>
</body>
</html>
